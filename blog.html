<main class="blog-main">
  <div class="blog-container">

    <div class="blog-header fade-in">
      <div>
        <span class="section-pill">Writing</span>
        <h1>Notes & Thoughts</h1>
        <p class="blog-subtitle">Daily updates, discoveries, and half-finished ideas. Documented.</p>
      </div>
      <div class="blog-stats mono muted" id="blog-stats">
        <span id="post-count">—</span> posts
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar fade-in-1" id="filter-bar">
      <button class="filter-btn active" data-tag="all">All</button>
      <!-- tags loaded dynamically -->
    </div>

    <!-- Search -->
    <div class="search-bar fade-in-1">
      <input type="text" id="search-input" placeholder="Search posts..." class="search-input" />
      <span class="search-icon mono muted">⌕</span>
    </div>

    <!-- Posts List -->
    <div class="posts-list" id="posts-list">
      <!-- loaded by JS -->
      <div class="post-skeleton"></div>
      <div class="post-skeleton"></div>
      <div class="post-skeleton"></div>
    </div>

    <!-- Post Reader (opens inline) -->
    <div class="post-reader" id="post-reader">
      <button class="back-btn mono" id="back-btn">← Back to all posts</button>
      <article class="post-article" id="post-article"></article>
    </div>

  </div>
