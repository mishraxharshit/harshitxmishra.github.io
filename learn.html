<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn - Research & Knowledge Base</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F6F3;
            --surface: #FFFFFF;
            --dark: #0F0F0F;
            --accent: #E63946;
            --blue: #1D6FA4;
            --green: #2A9D5C;
            --orange: #E07B27;
            --purple: #7B5EA7;
            --border: #E0DDD8;
            --text: #1A1A1A;
            --muted: #888;
            --tag-bg: #F0EEE9;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'IBM Plex Sans', sans-serif;
            color: var(--text);
            margin: 0;
            padding-top: 60px;
        }

        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.03; z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .main-nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: var(--surface);
            border-bottom: 1.5px solid var(--border);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        .nav-left .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.2rem; font-weight: 700;
            color: var(--dark); text-decoration: none;
        }
        .nav-right { display: flex; gap: 2rem; }
        .nav-right a {
            font-size: 0.9rem; color: var(--text);
            text-decoration: none; transition: color 0.2s;
        }
        .nav-right a:hover, .nav-right a.active { color: var(--accent); }

        .learn-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr 400px;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar */
        .learn-sidebar {
            background: var(--surface);
            border-right: 1.5px solid var(--border);
            position: sticky; top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto; padding: 1.5rem 0;
        }
        .sidebar-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted); padding: 0 1.5rem; margin-bottom: 1.5rem;
        }
        .topic-group { margin-bottom: 0.5rem; }
        .topic-header {
            width: 100%; display: flex; align-items: center; gap: 0.8rem;
            padding: 0.8rem 1.5rem; background: none; border: none;
            cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem; font-weight: 600; color: var(--text);
            transition: background 0.2s; text-align: left;
        }
        .topic-header:hover { background: var(--tag-bg); }
        .topic-header.active { background: var(--tag-bg); color: var(--accent); }
        .topic-icon { font-size: 0.85rem; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
        .expand-icon { margin-left: auto; font-size: 0.7rem; transition: transform 0.3s; }
        .topic-header.active .expand-icon { transform: rotate(180deg); }
        .topic-items { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .topic-items.active { max-height: 500px; }
        .topic-item {
            display: block; padding: 0.6rem 1.5rem 0.6rem 3.5rem;
            font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem;
            color: var(--muted); text-decoration: none; transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .topic-item:hover { color: var(--text); background: var(--tag-bg); }
        .topic-item.available { color: var(--text); }
        .topic-item.coming-soon { opacity: 0.5; cursor: default; pointer-events: none; font-style: italic; }

        /* Main content */
        .learn-content { padding: 3rem; overflow-y: auto; }
        .content-header { margin-bottom: 2rem; }
        .breadcrumb {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem;
        }
        .breadcrumb .separator { margin: 0 0.5rem; }
        .content-header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2.2rem; font-weight: 700;
            color: var(--dark); margin-bottom: 0.5rem;
        }
        .content-header h1 .accent { color: var(--accent); }
        .content-header .lead { font-size: 1.05rem; color: var(--muted); line-height: 1.7; }

        .learning-path { display: flex; flex-direction: column; gap: 1rem; }
        .path-item {
            display: flex; gap: 1.5rem;
            background: var(--surface); border: 1.5px solid var(--border);
            padding: 1.5rem; transition: all 0.3s; cursor: pointer;
        }
        .path-item:hover { border-color: var(--accent); box-shadow: 4px 4px 0 var(--dark); }
        .path-item.coming-soon { opacity: 0.5; cursor: not-allowed; }
        .path-item.coming-soon:hover { border-color: var(--border); box-shadow: none; }
        .path-number {
            font-family: 'IBM Plex Mono', monospace; font-size: 1.8rem;
            font-weight: 700; color: var(--accent); opacity: 0.3; min-width: 50px;
        }
        .path-content h4 {
            font-family: 'IBM Plex Mono', monospace; font-size: 1rem;
            margin-bottom: 0.5rem; color: var(--dark);
        }
        .path-content p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
        .path-badge {
            display: inline-block; font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem; padding: 0.2rem 0.6rem; margin-top: 0.5rem;
            background: var(--green); color: #fff; border-radius: 2px;
        }
        .path-badge.soon { background: var(--tag-bg); color: var(--muted); }

        /* Research Panel */
        .research-panel {
            background: var(--surface); border-left: 1.5px solid var(--border);
            position: sticky; top: 60px;
            height: calc(100vh - 60px); overflow-y: auto; padding: 1.5rem;
        }
        .panel-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1.5px solid var(--border); }
        .panel-title {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--dark); margin-bottom: 0.5rem;
        }
        .panel-subtitle { font-size: 0.75rem; color: var(--muted); }
        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-tab {
            padding: 0.4rem 0.8rem; font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem; background: var(--tag-bg); border: 1px solid var(--border);
            color: var(--text); cursor: pointer; transition: all 0.2s;
        }
        .filter-tab:hover { border-color: var(--accent); }
        .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        .research-card {
            background: var(--surface); border: 1.5px solid var(--border);
            padding: 1rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s;
        }
        .research-card:hover { border-color: var(--accent); transform: translateX(-2px); }
        .research-meta { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .research-badge {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
            padding: 0.2rem 0.5rem; background: var(--tag-bg); color: var(--muted);
        }
        .research-badge.new { background: var(--green); color: white; }
        .research-title {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem;
            font-weight: 600; color: var(--dark); margin-bottom: 0.5rem; line-height: 1.4;
        }
        .research-summary { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.5rem; }
        .research-footer {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace;
        }
        .research-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
        .stat-box { background: var(--tag-bg); border: 1.5px solid var(--border); padding: 1rem; text-align: center; }
        .stat-number {
            font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem;
            font-weight: 700; color: var(--accent); margin-bottom: 0.3rem;
        }
        .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .loading { text-align: center; padding: 2rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }

        @media (max-width: 1200px) {
            .learn-layout { grid-template-columns: var(--sidebar-width) 1fr; }
            .research-panel { display: none; }
        }
        @media (max-width: 768px) {
            .learn-layout { grid-template-columns: 1fr; }
            .learn-sidebar { position: relative; height: auto; }
        }
    </style>
</head>
<body>

<div class="grain-overlay"></div>

<nav class="main-nav">
    <div class="nav-left">
        <a href="index.html" class="logo">HM</a>
    </div>
    <div class="nav-right">
        <a href="index.html#work">Work</a>
        <a href="index.html#research">Research</a>
        <a href="index.html#captures">Captures</a>
        <a href="learn.html" class="active">Learn</a>
        <a href="https://github.com/mishraxharshit/portfolio/wiki" target="_blank">Wiki ↗</a>
    </div>
</nav>

<div class="learn-layout">

    <!-- Sidebar — built from JSON -->
    <aside class="learn-sidebar">
        <div class="sidebar-title">Knowledge Base</div>
        <div id="learnSidebar">
            <div class="loading">Loading...</div>
        </div>
    </aside>

    <!-- Main Content — built from JSON -->
    <main class="learn-content">
        <div class="content-header">
            <div class="breadcrumb">
                <span>Learn</span>
                <span class="separator">/</span>
                <span>Overview</span>
            </div>
            <h1>Knowledge <span class="accent">Hub</span></h1>
            <p class="lead">Structured learning paths combined with latest research. Theory meets practice.</p>
        </div>
        <div class="learning-path" id="learningPath">
            <div class="loading">Loading courses...</div>
        </div>
    </main>
<script>
// ==========================================
// JSON-DRIVEN LEARN PAGE
// To add new courses: edit data/learn-content.json
// ==========================================

async function initLearnPage() {
  try {
    const res = await fetch('data/learn-content.json');
    const data = await res.json();
    buildLearnSidebar(data.courses);
    buildLearningPath(data.courses);
  } catch (err) {
    console.error('Could not load learn-content.json:', err);
    document.getElementById('learningPath').innerHTML = 
      '<p style="color:var(--muted)">Could not load courses. Make sure <code>data/learn-content.json</code> exists.</p>';
  }
}

function buildLearnSidebar(courses) {
  const sidebar = document.getElementById('learnSidebar');
  let html = '';
  
  courses.forEach(course => {
    const isAvailable = !course.comingSoon && course.file;
    html += `
      <div class="topic-group">
        <button class="topic-header" data-course="${course.id}">
          <span class="topic-icon">${course.icon}</span>
          <span>${course.title}</span>
          <span class="expand-icon">▼</span>
        </button>
        <div class="topic-items" id="items-${course.id}">
    `;
    
    if (isAvailable) {
      // List phases as items
      course.phases.forEach(phase => {
        html += `<a href="${course.file}" class="topic-item available">${phase.label}</a>`;
      });
    } else {
      html += `<span class="topic-item coming-soon">Coming Soon</span>`;
    }
    
    html += `</div></div>`;
  });
  
  sidebar.innerHTML = html;
  
  // Toggle expand/collapse
  sidebar.querySelectorAll('.topic-header').forEach(header => {
    header.addEventListener('click', function() {
      const id = this.getAttribute('data-course');
      const items = document.getElementById('items-' + id);
      this.classList.toggle('active');
      items.classList.toggle('active');
    });
  });
  
  // Open first available course
  const firstHeader = sidebar.querySelector('.topic-header');
  if (firstHeader) {
    firstHeader.click();
  }
}

function buildLearningPath(courses) {
  const path = document.getElementById('learningPath');
  let html = '';
  
  courses.forEach((course, index) => {
    const isAvailable = !course.comingSoon && course.file;
    const num = String(index + 1).padStart(2, '0');
    const topicCount = course.phases.reduce((sum, p) => sum + p.topics.length, 0);
    const desc = isAvailable 
      ? `${course.phases.length} phases, ${topicCount} topics with visual explanations.`
      : 'Coming soon.';
    
    html += `
      <div class="path-item ${isAvailable ? '' : 'coming-soon'}" 
           ${isAvailable ? `onclick="window.location.href='${course.file}'"` : ''}>
        <div class="path-number">${num}</div>
        <div class="path-content">
          <h4>${course.title}</h4>
          <p>${desc}</p>
          <span class="path-badge ${isAvailable ? '' : 'soon'}">${isAvailable ? '● AVAILABLE' : '○ COMING SOON'}</span>
        </div>
      </div>
    `;
  });
  
  path.innerHTML = html;
}
</script>

</body>
</html>
